<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FactLens AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Local libraries for Markdown parsing and Syntax Highlighting -->
    <script src="lib/marked.min.js"></script>
    <script src="lib/highlight.min.js"></script>
    <link rel="stylesheet" href="lib/github-dark.min.css">

    <!-- Primary CSS -->
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <header>
        <a href="https://login.askfinz.ai" target="_blank" class="header-link">
            <div class="header-left">
                <img class="logo-icon" src="icons/AskFinz_symbol_light.svg" alt="askFinz Logo">
                <h1>FactLens</h1>
            </div>
        </a>
        <div class="header-right">
            <div class="settings-group">
                <select id="model-select" class="settings-select" title="Gemini Model">
                    <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash</option>
                    <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                    <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                </select>
                <div class="vllm-toggle-container">
                    <label class="switch" title="Toggle VLLM (Llama-3)">
                        <input type="checkbox" id="vllm-toggle">
                        <span class="slider round"></span>
                    </label>
                    <span class="vllm-label">VLLM</span>
                </div>
            </div>
            <div id="status" class="status-badge">Ready</div>
        </div>
    </header>

    <div class="main-content">
        <!-- Tab Navigation -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="analysis-tab">Analysis</button>
            <button class="tab-btn" data-tab="chat-tab">Chat</button>
            <button class="tab-btn" data-tab="similar-tab">Similar</button>
        </div>

        <!-- Analysis View -->
        <div id="analysis-tab" class="tab-content active">
            <button id="analyze-btn" class="btn-primary">Analyze Page Content</button>
            <div id="spinner" class="spinner-container" style="display: none;">
                <div class="spinner"></div>
                <span id="progress-text" style="color: var(--text-secondary); margin-left: 12px; font-weight: 500; display: none; align-self: center;"></span>
            </div>
            <!-- Trust Gauge -->
            <div id="trust-gauge-container" style="display: none; margin-bottom: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <span style="font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Accuracy Gauge</span>
                    <span id="gauge-label" style="font-size: 0.75rem; font-weight: 600; color: var(--text-primary);">–</span>
                </div>
                <div class="gauge-track">
                    <div id="gauge-true" class="gauge-segment gauge-true" style="width:0%"></div>
                    <div id="gauge-false" class="gauge-segment gauge-false" style="width:0%"></div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 6px; font-size: 0.7rem;">
                    <span style="color: #4ade80; display: flex; align-items: center; gap: 4px;"><span style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;"></span><span id="gauge-true-count">0 True</span></span>
                    <span style="color: #f87171; display: flex; align-items: center; gap: 4px;"><span style="width:8px;height:8px;border-radius:50%;background:#f87171;display:inline-block;"></span><span id="gauge-false-count">0 False</span></span>
                    <span style="color: var(--text-secondary); display: flex; align-items: center; gap: 4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--border-color);display:inline-block;"></span><span id="gauge-pending-count">0 Pending</span></span>
                </div>
            </div>

            <div id="results" class="results-container">
                <!-- Top priority cards -->
                <div id="bias-slot"></div>
                <div id="verdict-slot"></div>
                <!-- Streamed claim cards -->
                <div id="claims-container"></div>
            </div>
        </div>

        <!-- Interactive Chat View -->
        <div id="chat-tab" class="tab-content" style="display: none;">
            <div id="chat-messages" class="chat-history">
                <div class="message ai-message">
                    <div class="message-content">Hello! I've loaded the page context. You can ask me any questions about the content or dive deeper into the analyzed claims.</div>
                    <div class="message-actions">
                        <button class="tts-btn" aria-label="Read aloud">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M11 5L6 9H2V15H6L11 19V5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                                <path d="M19.07 4.93C20.9447 6.80528 21.998 9.34836 21.998 12C21.998 14.6516 20.9447 17.1947 19.07 19.07M15.54 8.46C16.4774 9.39764 17.0039 10.6692 17.0039 11.995C17.0039 13.3208 16.4774 14.5924 15.54 15.53" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-container">
                <textarea id="chat-input" placeholder="Ask about the page..." rows="1"></textarea>
                <div class="input-actions" style="display: flex; gap: 8px;">
                    <button id="stt-btn" class="btn-icon" aria-label="Voice input">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <button id="chat-send-btn" class="btn-send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Similar Articles View -->
        <div id="similar-tab" class="tab-content" style="display: none;">
            <div id="similar-articles-results" class="results-container">
                <div class="empty-state" style="text-align: center; color: var(--text-secondary); margin-top: 40px; font-size: 0.9rem;">
                    Analyze a page to see similar coverage here.
                </div>
            </div>
        </div>
    </div>

    <!-- Script that hooks it all together -->
    <script src="sidepanel.js"></script>
</body>
</html>
